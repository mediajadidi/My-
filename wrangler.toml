name = "aj-sports-unified-worker"
main = "worker.js"
compatibility_date = "2025-06-01"

# ------------------------------------------------------------------
# KV Namespace — یک namespace مشترک برای هر دو فرانت (پروفایل + پیش‌بینی)
# مراحل ساخت:
#   1) npx wrangler kv namespace create AJ_SPORTS_KV
#   2) خروجی دستور بالا یک id می‌دهد؛ آن را جای YOUR_KV_NAMESPACE_ID زیر بگذار
# ------------------------------------------------------------------
[[kv_namespaces]]
binding = "KV_STORE"
id = "YOUR_KV_NAMESPACE_ID"

# ------------------------------------------------------------------
# متغیرهای غیر حساس (Non-secret vars) — این‌ها همینجا commit می‌شوند
# ------------------------------------------------------------------
