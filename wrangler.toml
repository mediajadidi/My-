SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2Z3Ntb3N6aXZ1a3ZkZWdxdXhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc5Mzg0NDQsImV4cCI6MjA3MzUxNDQ0NH0.B0UslNCyxba9uMs80DDGQ0XfQQsSE3THHfsSDaG9V8o"
